<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Screen</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>


<div class="background"></div>
<div class="overlay"></div>


<div class="header">

    <img class="server-logo" src="media/logo.png">

    <div>
        <h1>YOUR SERVER NAME</h1>

        <div class="server-social">
            <i class="fab fa-discord"></i>
            <i class="fab fa-instagram"></i>
            <i class="fab fa-tiktok"></i>
        </div>
    </div>

</div>


<div class="players">

    <div class="player">
        <img src="https://cdn.discordapp.com/attachments/1493053100142104764/1504923263904649216/Ekran_goruntusu_2026-05-10_181131.png?ex=6a08c082&is=6a076f02&hm=2d74a5b5f7d8b1c37686b36fd8abdea0ce701eca755b2184154499b652f0590a&">
        <span>Owner</span>
    </div>

    <div class="player">
        <img src="https://cdn.discordapp.com/attachments/1493053100142104764/1504923263904649216/Ekran_goruntusu_2026-05-10_181131.png?ex=6a08c082&is=6a076f02&hm=2d74a5b5f7d8b1c37686b36fd8abdea0ce701eca755b2184154499b652f0590a&">
        <span>Project Leader</span>
    </div>

    <div class="player">
        <img src="https://cdn.discordapp.com/attachments/1493053100142104764/1504923263904649216/Ekran_goruntusu_2026-05-10_181131.png?ex=6a08c082&is=6a076f02&hm=2d74a5b5f7d8b1c37686b36fd8abdea0ce701eca755b2184154499b652f0590a&">
        <span>Developer</span>
    </div>

</div>


<div class="music-card">

    <audio id="audio"></audio>

    <div class="song-info">
        <h2 id="now-playing">ŞU AN ÇALIYOR</h2>
        <p>YOUR SERVER MUSIC</p>
    </div>

    
    <div class="progress-container">
        <span id="current-time">0:00</span>
        <div class="bar">
            <div id="progress-bar"></div>
        </div>
        <span id="duration">0:00</span>
    </div>

   
    <div class="controls">

        <button id="prevBtn"><i class="fas fa-backward"></i></button>

        <button id="play-pause">
            <i id="playIcon" class="fas fa-play"></i>
        </button>

        <button id="nextBtn"><i class="fas fa-forward"></i></button>

    </div>

   
    <div class="volume">

        <i class="fas fa-volume-down"></i>

        <input id="volume" type="range" min="0" max="1" step="0.01" value="0.3">

        <i class="fas fa-volume-up"></i>

    </div>

</div>

</div>


<div class="load-container">

    <div class="percentage">
        <span id="percent">0</span>%
    </div>

    <div class="progress-bg">
        <div id="progress-bar"></div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
