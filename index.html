<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="overlay"></div>
    <div class="background" style="background-image: url('media/bg.jpg');"></div>

    <div class="header">
        <h1>YOUR SERVER NAME</h1>
        <p>ESTABLISHED IN 2026</p>
    </div>

    <div class="right-panels">
        <div class="panel">
            <span class="badge info">INFO</span>
            <h3>Sunucu Kuralları</h3>
            <p>Rol kalitesini artırmak için kurallara uyunuz.</p>
        </div>
        <div class="panel">
            <span class="badge ann">ANNOUNCEMENTS</span>
            <h3>Güncelleme v1.2</h3>
            <p>MADE BY GEFAHR17</p>
        </div>
    </div>

    <div class="music-player">
        <div class="track-info">
            <p id="now-playing">NOW PLAYING: Music 1</p>
        </div>
        <div class="controls">
            <button onclick="prevTrack()">⏮</button>
            <button id="play-pause" onclick="togglePlay()">⏸</button>
            <button onclick="nextTrack()">⏭</button>
        </div>
        <div class="volume-control">
            <span>🔈</span>
            <input type="range" id="volume" min="0" max="1" step="0.1" value="0.5" onchange="changeVolume(this.value)">
            <span>🔊</span>
        </div>
    </div>

    <div class="load-container">
        <div class="percentage"><span id="percent">0</span>% <small>LOADING CLIENT FILES...</small></div>
        <div class="progress-bg">
            <div id="progress-bar"></div>
        </div>
        <div class="status-text">INITIALIZING SCRIPTS...</div>
    </div>

    <audio id="audio" src="media/music1.mp3" autoplay></audio>
    <script src="script.js"></script>
</body>
</html>
