<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="overlay"></div>
    <div class="background" style="background-image: url('media/bg.jpg');"></div>

    <div class="header">
        <h1>Gefahr17dev</h1>
    </div>

    
<div class="music-player">
    <div class="track-info">
        
        <p id="now-playing">CHIKO X CESIMINHO - TAKIMINIZ FIS</p>
    </div>
    <div class="controls">
        <button onclick="prevTrack()"><i class="fas fa-backward"></i></button>
        <button id="play-pause" onclick="togglePlay()"><i class="fas fa-pause"></i></button>
        <button onclick="nextTrack()"><i class="fas fa-forward"></i></button>
    </div>
    <div class="volume-control">
        <i class="fas fa-volume-down"></i>
        
        <input type="range" id="volume" min="0" max="1" step="0.01" value="0.3" oninput="changeVolume(this.value)">
        <i class="fas fa-volume-up"></i>
    </div>
</div>
    
    <div class="load-container">
        <div class="percentage"><span id="percent">0</span>%</div>
        <div class="progress-bg">
            <div id="progress-bar"></div>
        </div>
    </div>

    <audio id="audio" src="media/music1.mp3"></audio>
    <script src="script.js"></script>

    <audio id="audio" src="media/music2.mp3"></audio>
    <script src="script.js"></script>
</body>
</html>
