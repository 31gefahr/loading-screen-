<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MİL ROLEPLAY - Giriş</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="overlay"></div>
    <img src="bg.jpg" class="background-image" alt="Background">

    <audio id="loading-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="main-container">
        
        <div class="header-container">
            <div class="header-content">
                <span class="logo-text">MÖ</span>
                <span class="header-title">MİL ROLEPLAY</span>
                <span class="header-location">ANTALYA, TÜRKİYE</span>
            </div>
        </div>

        <div class="mid-right-photo">
            <img src="img/mid_photo1.png" alt="Orta Foto">
        </div>

        <div class="panel-right-bottom">
            <h3>Bağlantı Durumu</h3>
            <ul>
                <li><span class="status-icon green">●</span> Sunucuya Bağlanılıyor...</li>
                <li><span class="status-icon yellow">●</span> Veriler Senkronize Ediliyor...</li>
                <li><span class="status-icon gray">●</span> Karakter Yükleniyor...</li>
            </ul>
        </div>

        <div class="left-bottom-container">
            <div class="square-photos">
                <div class="square-box"><img src="img/square1.jpg" alt="Sq1"></div>
                <div class="square-box"><img src="img/square2.jpg" alt="Sq2"></div>
                <div class="square-box"><img src="img/square3.jpg" alt="Sq3"></div>
            </div>
            <div class="nav-icons">
                <a href="#" target="_blank"><img src="https://img.icons8.com/color/48/000000/discord-new-logo.png" alt="Discord"></a>
                <a href="#" target="_blank"><img src="https://img.icons8.com/color/48/000000/steam.png" alt="Steam"></a>
                <a href="#" target="_blank"><img src="https://img.icons8.com/color/48/000000/youtube-play.png" alt="YouTube"></a>
            </div>
        </div>

    </div>

    <div class="loading-bar-container">
        <div class="loading-bar"></div>
        <p>Yükleniyor... <span id="progress-percent">0</span>%</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
